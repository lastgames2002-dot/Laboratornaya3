<html>
<head>
<title>Эта страница создана за 5 минут</title>
</head>
<body>
    Сегодня отличный день. <br>Я сделал свою первую страничку.

    <h3>Индивидуальное задание 2</h3>
    <p id="result"></p>

    <h3>Индивидуальное задание 3</h3>
    <p>Откройте консоль или следите за диалогами:</p>

    <script>
        // Задание 2 (уже было)
        let admin;
        let name = "Эльдар";
        admin = name;
        alert("admin = " + admin);
        document.getElementById('result').innerHTML = "Значение admin: <strong>" + admin + "</strong>";

        // Задание 3: запрос возраста с уточнением
        function askAge() {
            let age;
            let confirmed = false;

            while (!confirmed) {
                // Запрашиваем возраст (если отмена – вернётся null)
                age = prompt("Введите ваш возраст:");

                // Если пользователь нажал "Отмена" в prompt, повторяем запрос
                if (age === null) {
                    continue;
                }

                // Уточняем: "Вы ввели X. Верно?" (ОК — да, Отмена — нет)
                confirmed = confirm("Вы ввели " + age + ". Верно?");
            }
            // Завершаем выполнение (можно вывести итоговое сообщение)
            alert("Спасибо! Ваш возраст: " + age);
        }

        // Запускаем функцию
        askAge();
    </script>
</body>
</html>
